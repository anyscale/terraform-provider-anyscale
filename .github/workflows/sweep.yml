name: Sweep

on:
  schedule:
    - cron: "0 3 * * *"  # daily at 03:00 UTC
  workflow_dispatch:  # also runnable manually

jobs:
  sweep:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: "1.25"

      - name: Setup Terraform
        # Not kept in sync with ci.yml/scheduled-acctest.yml's 1.15.7 pin, and does
        # not need to be: those pin 1.15.0+ because terraform init under
        # dev_overrides 404s for an unpublished provider source below that version
        # (see ci.yml's Setup Terraform step). The sweeper only calls the Anyscale
        # API directly, no plan/apply, so it never hits that path. Aligned to the
        # documented compatibility floor (CLAUDE.md) as of this fix, not because the
        # sweeper needs it -- fine to leave as is or bump independently of the other
        # two files.
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: "1.10.0"
          terraform_wrapper: false

      - name: Run Sweep
        env:
          ANYSCALE_CLI_TOKEN: ${{ secrets.ANYSCALE_CLI_TOKEN }}
        run: make sweep
