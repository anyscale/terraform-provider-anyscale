name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [lint-and-unit, acctest-data, acctest-resource]
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - name: Changelog build idempotency check
        if: matrix.shard == 'lint-and-unit'
        run: |
          SCRATCH_FRAGMENT=".changelog/ci-idempotency-smoke-test.txt"
          printf '```\nrelease-note:added\nprovider: CI idempotency smoke-test fragment, not a real change.\n```\n' > "$SCRATCH_FRAGMENT"
          make changelog-build
          cp CHANGELOG.md /tmp/changelog-first-fold.md
          make changelog-build
          if ! diff -u /tmp/changelog-first-fold.md CHANGELOG.md; then
            echo "::error::make changelog-build is not idempotent -- running it twice produced different output"
            exit 1
          fi
          git checkout -- CHANGELOG.md
          rm -f "$SCRATCH_FRAGMENT"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"
          terraform_wrapper: false

      - name: Install golangci-lint
        if: matrix.shard == 'lint-and-unit'
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.7

      - name: Install tfplugindocs
        if: matrix.shard == 'lint-and-unit'
        run: go install github.com/hashicorp/terraform-plugin-docs/cmd/tfplugindocs@latest

      - name: Format
        if: matrix.shard == 'lint-and-unit'
        run: |
          make fmt
          git diff --exit-code || (echo "Code is not formatted. Run 'make fmt' locally." && exit 1)

      - name: Vet
        if: matrix.shard == 'lint-and-unit'
        run: make vet

      - name: Generate Docs
        if: matrix.shard == 'lint-and-unit'
        run: |
          make docs
          git diff --exit-code || (echo "Docs are out of date. Run 'make docs' locally." && exit 1)

      - name: Test
        if: matrix.shard == 'lint-and-unit'
        run: make test

      - name: Acceptance Tests - Data Sources
        if: matrix.shard == 'acctest-data'
        env:
          ANYSCALE_CLI_TOKEN: ${{ secrets.ANYSCALE_CLI_TOKEN }}
          ANYSCALE_TEST_CREATE_CLOUD: 1
        run: |
          set -o pipefail
          TF_ACC=1 go test ./internal/acctest/ -v -timeout 60m -parallel 4 -run '^TestAcc[A-Za-z]+DataSource' 2>&1 | tee /tmp/acctest.log
          .github/scripts/summarize-acctest-skips.sh /tmp/acctest.log "Acceptance Tests - Data Sources"

      - name: Acceptance Tests - Resources
        if: matrix.shard == 'acctest-resource'
        env:
          ANYSCALE_CLI_TOKEN: ${{ secrets.ANYSCALE_CLI_TOKEN }}
          ANYSCALE_TEST_CREATE_CLOUD: 1
        run: |
          set -o pipefail
          TF_ACC=1 go test ./internal/acctest/ -v -timeout 90m -parallel 4 -run '^TestAcc[A-Za-z]+Resource' 2>&1 | tee /tmp/acctest.log
          .github/scripts/summarize-acctest-skips.sh /tmp/acctest.log "Acceptance Tests - Resources"
          .github/scripts/summarize-compute-config-coverage.sh /tmp/acctest.log "Acceptance Tests - Resources"
