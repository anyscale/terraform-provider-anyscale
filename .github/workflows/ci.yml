name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [lint-and-unit, acctest-data, acctest-resource]
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "1.25"

      - name: Changelog build idempotency check
        if: matrix.shard == 'lint-and-unit'
        run: |
          SCRATCH_FRAGMENT=".changelog/ci-idempotency-smoke-test.txt"
          printf '```\nrelease-note:added\nprovider: CI idempotency smoke-test fragment, not a real change.\n```\n' > "$SCRATCH_FRAGMENT"
          make changelog-build
          cp CHANGELOG.md /tmp/changelog-first-fold.md
          make changelog-build
          if ! diff -u /tmp/changelog-first-fold.md CHANGELOG.md; then
            echo "::error::make changelog-build is not idempotent -- running it twice produced different output"
            exit 1
          fi
          git checkout -- CHANGELOG.md
          rm -f "$SCRATCH_FRAGMENT"

      - name: Setup Terraform
        # Pinned >= 1.15.0: that release fixed how `terraform init` handles a
        # dev_overrides-active provider whose source has no real registry
        # presence (our case below) -- pre-1.15 versions hard-fail querying
        # the registry for it instead of skipping the query. Pinning to the
        # latest stable rather than the bisected floor (1.15.0) deliberately,
        # per team review. This version applies to every shard in this job's
        # matrix, including acctest-data/acctest-resource, not just
        # lint-and-unit -- verified those two stay green before landing this.
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_version: "1.15.7"
          terraform_wrapper: false

      - name: Install golangci-lint
        if: matrix.shard == 'lint-and-unit'
        uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9.3.0
        with:
          version: v2.7

      - name: Install tfplugindocs
        if: matrix.shard == 'lint-and-unit'
        run: go install github.com/hashicorp/terraform-plugin-docs/cmd/tfplugindocs@latest

      - name: Format
        if: matrix.shard == 'lint-and-unit'
        run: |
          make fmt
          git diff --exit-code || (echo "Code is not formatted. Run 'make fmt' locally." && exit 1)

      - name: Vet
        if: matrix.shard == 'lint-and-unit'
        run: make vet

      - name: Generate Docs
        if: matrix.shard == 'lint-and-unit'
        run: |
          make docs
          git diff --exit-code || (echo "Docs are out of date. Run 'make docs' locally." && exit 1)

      - name: Test
        if: matrix.shard == 'lint-and-unit'
        run: make test

      - name: Validate Examples
        if: matrix.shard == 'lint-and-unit'
        # This step runs `terraform init` while dev_overrides is active for the
        # anyscale provider, which CLAUDE.md's local-dev guidance says to avoid
        # ("provider is not in the public registry"). That guidance is about
        # local workflows on whatever Terraform happens to be on a developer's
        # PATH; here the version is pinned above specifically so init resolves
        # this correctly -- on Terraform >= 1.15, init skips registry
        # resolution for a dev-overridden provider entirely (confirmed via the
        # "not installed as part of init since they were overwritten" notice
        # and an empty entry for it in the resulting .terraform.lock.hcl),
        # while still installing the real providers (aws/google/random/etc.)
        # each example also declares -- without those, `terraform validate`
        # would have no schema to check resource blocks against and this gate
        # would pass vacuously. Do not lower the pinned version above without
        # re-verifying this interaction on a clean checkout.
        run: |
          set -euo pipefail
          make build
          override_dir="$(mktemp -d)"
          cp terraform-provider-anyscale "$override_dir/"
          cli_config="$(mktemp)"
          cat > "$cli_config" <<RC
          provider_installation {
            dev_overrides {
              "registry.terraform.io/anyscale/anyscale" = "$override_dir"
            }
            direct {}
          }
          RC
          export TF_CLI_CONFIG_FILE="$cli_config"
          status=0
          for dir in examples/*/; do
            [ -f "${dir}versions.tf" ] || continue
            echo "==> terraform init + validate: ${dir}"
            if ! (cd "$dir" && terraform init -backend=false -input=false -no-color \
                && terraform validate -no-color); then
              echo "::error::terraform validate failed for ${dir}"
              status=1
            fi
          done
          exit "$status"

      - name: Acceptance Tests - Data Sources
        # Skipped on Dependabot PRs: GitHub withholds Actions secrets from
        # Dependabot-triggered runs, so ANYSCALE_CLI_TOKEN is empty and these
        # real-infra tests can't authenticate. See the Dependabot notice step
        # below, which keeps this required check green and explains the skip.
        if: matrix.shard == 'acctest-data' && github.actor != 'dependabot[bot]'
        env:
          ANYSCALE_CLI_TOKEN: ${{ secrets.ANYSCALE_CLI_TOKEN }}
          ANYSCALE_TEST_CREATE_CLOUD: 1
        run: |
          set -o pipefail
          TF_ACC=1 go test ./internal/acctest/ -v -timeout 60m -parallel 4 -run '^TestAcc[A-Za-z]+DataSource' 2>&1 | tee /tmp/acctest.log
          .github/scripts/summarize-acctest-skips.sh /tmp/acctest.log "Acceptance Tests - Data Sources"

      - name: Acceptance Tests - Resources
        if: matrix.shard == 'acctest-resource' && github.actor != 'dependabot[bot]'
        env:
          ANYSCALE_CLI_TOKEN: ${{ secrets.ANYSCALE_CLI_TOKEN }}
          ANYSCALE_TEST_CREATE_CLOUD: 1
        run: |
          set -o pipefail
          TF_ACC=1 go test ./internal/acctest/ -v -timeout 90m -parallel 4 -run '^TestAcc[A-Za-z]+Resource' 2>&1 | tee /tmp/acctest.log
          .github/scripts/summarize-acctest-skips.sh /tmp/acctest.log "Acceptance Tests - Resources"
          .github/scripts/summarize-compute-config-coverage.sh /tmp/acctest.log "Acceptance Tests - Resources"

      - name: Acceptance Tests skipped (Dependabot PR)
        # Dependabot-triggered runs get no access to Actions secrets, so the
        # acctest steps above are skipped (their `github.actor` guard). This
        # step keeps the acctest-data / acctest-resource required checks green
        # and records WHY, so the skip is explicit rather than silent. Dep
        # bumps are still gated by lint-and-unit (build + unit tests against the
        # updated deps) and release-preflight. To force real acctests on a
        # specific bump, push a commit to its branch so the run is
        # human-triggered (secrets are then available).
        if: (matrix.shard == 'acctest-data' || matrix.shard == 'acctest-resource') && github.actor == 'dependabot[bot]'
        run: echo "::notice::Acceptance tests skipped for Dependabot PR (Actions secrets are unavailable to Dependabot runs); this PR is gated by lint-and-unit + release-preflight instead."
