# Registry Smoke Test
#
# Verifies the provider published as `anyscale/anyscale` is actually installable
# from the real Terraform Registry. A plain `terraform init` against the public
# registry (NO dev_overrides) downloads the provider AND verifies its GPG
# signature against the Registry-held public key -- so this catches
# registry-ingestion failures and signing/GPG problems that only surface at
# consume time, none of which release.yml or release-preflight.yml can see
# (they publish/validate, but never install the published artifact back).
#
# This runs on a schedule (to catch a Registry-side regression even with no new
# release) and on demand. It uses no secrets and never runs `terraform apply`,
# so it needs no Anyscale credentials or cloud infra.
name: Registry Smoke Test

on:
  schedule:
    # Weekly, Sunday 06:17 UTC -- off-peak and off the :00 mark to avoid the
    # top-of-hour scheduling stampede on GitHub-hosted runners.
    - cron: "17 6 * * 0"
  workflow_dispatch:
    inputs:
      version:
        description: "Provider version to test (e.g. 0.2.0). Leave empty to install the latest published version."
        required: false
        type: string
        default: ""

permissions:
  contents: read

concurrency:
  group: registry-smoke-test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  registry-smoke-test:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_wrapper: false

      - name: Init against the real Terraform Registry
        env:
          # Optional pin from workflow_dispatch; empty on scheduled runs.
          PROVIDER_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          workdir="$(mktemp -d)"
          cd "$workdir"

          if [ -n "${PROVIDER_VERSION}" ]; then
            version_line="      version = \"${PROVIDER_VERSION}\""
            echo "==> Testing anyscale/anyscale version ${PROVIDER_VERSION}"
          else
            version_line=""
            echo "==> Testing latest published anyscale/anyscale"
          fi

          cat > main.tf <<TF
          terraform {
            required_providers {
              anyscale = {
                source = "anyscale/anyscale"
          ${version_line}
              }
            }
          }
          TF

          echo "==> Generated config:"
          cat main.tf

          # Real registry install. This downloads the provider and verifies its
          # GPG signature; a failure here IS the smoke-test failure signal.
          if ! terraform init -input=false -no-color; then
            echo "::error::terraform init failed -- the anyscale/anyscale provider could not be installed from the Terraform Registry (registry ingestion or GPG signature problem)."
            exit 1
          fi

          echo "==> Provider installed and signature verified successfully."
