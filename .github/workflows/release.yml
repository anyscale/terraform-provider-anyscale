# Terraform Provider release workflow
# This workflow creates releases for the Terraform Registry when a new tag is pushed.
#
# Prerequisites:
# 1. Create a GPG key pair for signing releases
# 2. Add the following secrets to your GitHub repository:
#    - GPG_PRIVATE_KEY: The GPG private key (armor exported)
#    - GPG_PASSPHRASE: The passphrase for the GPG key (if any)
#    - GITHUB_TOKEN: Automatically provided by GitHub Actions
#
# To create a release:
#   make changelog-release VERSION=0.1.0   # finalizes CHANGELOG.md on a branch, opens a PR
#   # ...get that PR reviewed and merged...
#   make tag VERSION=0.1.0                 # verifies CHANGELOG.md is finalized on main, tags, pushes
#
# See the `changelog-release` and `tag` targets in the Makefile, and
# RELEASING.md for why the changelog step goes through a PR instead of a
# direct push to main.

name: Release

on:
  push:
    tags:
      - "v*.*.*"

# Restrict permissions for security
permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          # Fetch full history for changelog generation
          fetch-depth: 0

      - name: Fetch all tags
        run: git fetch --force --tags

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"
          cache: true

      - name: Import GPG key
        id: import_gpg
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}

      # `make tag` already committed the finalized "## [x.y.z] - date" section
      # to CHANGELOG.md before pushing this tag (see the `tag` Makefile
      # target), so it's present on this checkout. Re-extract it rather than
      # trusting a local dist/release-notes.md, which never gets committed
      # (dist/ is gitignored) and so never survives to reach this runner.
      #
      # Written OUTSIDE dist/ deliberately: `goreleaser release --clean`
      # removes its own dist/ output directory before building, which would
      # delete a same-named file dropped there by this step moments earlier -
      # confirmed live on v0.1.2, where it silently produced an empty GitHub
      # Release body despite this step extracting the right content.
      - name: Extract release notes from CHANGELOG.md
        run: |
          version="${GITHUB_REF_NAME#v}"
          go run ./tools/changelog-build -extract "$version" -notes-out release-notes.md
          echo "==> release notes for $version:"
          cat release-notes.md

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean --release-notes=release-notes.md
        env:
          # GitHub token for creating releases
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GPG fingerprint for signing checksums
          GPG_FINGERPRINT: ${{ steps.import_gpg.outputs.fingerprint }}
