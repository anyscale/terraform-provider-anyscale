# GoReleaser configuration for terraform-provider-anyscale
# This configuration is designed to publish to the Terraform Registry
# See: https://goreleaser.com/customization/

version: 2

before:
  hooks:
    # `go mod download`, not `go mod tidy`, on purpose: tidy can rewrite
    # go.mod/go.sum mid-release, which dirties the tree GoReleaser builds from
    # and makes the release non-deterministic. download only populates the
    # module cache and leaves committed files untouched.
    - go mod download

builds:
  - id: terraform-provider-anyscale
    env:
      - CGO_ENABLED=0
    mod_timestamp: "{{ .CommitTimestamp }}"
    flags:
      - -trimpath
    ldflags:
      - "-s -w -X github.com/anyscale/terraform-provider-anyscale/internal/provider.Version={{ .Version }}"
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm
      - arm64
    goarm:
      - "6"
    ignore:
      - goos: windows
        goarch: arm
      - goos: windows
        goarch: arm64
    binary: "{{ .ProjectName }}_v{{ .Version }}"

archives:
  - id: terraform-provider-anyscale
    formats:
      - zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "{{ .ProjectName }}_{{ .Version }}_SHA256SUMS"
  algorithm: sha256
  # The Terraform Registry requires the manifest's checksum to appear in
  # SHA256SUMS. release.extra_files (below) uploads the manifest to the release
  # but does NOT feed it into the checksum, so it must be declared here too —
  # otherwise publish fails with "missing SHA256 checksum for ..._manifest.json".
  extra_files:
    - glob: "terraform-registry-manifest.json"
      name_template: "{{ .ProjectName }}_{{ .Version }}_manifest.json"

signs:
  - artifacts: checksum
    args:
      # If you are using this in a GitHub action, you need to configure GPG
      - "--batch"
      - "--local-user"
      - "{{ .Env.GPG_FINGERPRINT }}"
      - "--output"
      - "${signature}"
      - "--detach-sign"
      - "${artifact}"

release:
  # GitHub release settings
  github:
    owner: anyscale
    name: terraform-provider-anyscale

  # The Terraform Registry reads the provider's supported protocol versions from
  # a manifest asset named terraform-provider-anyscale_<version>_manifest.json.
  # Without it the Registry defaults to protocol 5.0, which is wrong for a
  # Plugin Framework provider (6.0). This publishes terraform-registry-manifest.json
  # under that required asset name.
  extra_files:
    - glob: "terraform-registry-manifest.json"
      name_template: "{{ .ProjectName }}_{{ .Version }}_manifest.json"
  
  # Draft releases allow you to review before publishing
  draft: false
  
  # Mark as prerelease if the tag contains -rc, -beta, -alpha
  prerelease: auto
  
  # Release name template
  name_template: "{{ .ProjectName }} v{{ .Version }}"

# CHANGELOG.md (via tools/changelog-build, see RELEASING.md) is the single
# source of truth for release notes. release.yml extracts this version's
# CHANGELOG.md section and passes it via `--release-notes`, which already
# makes GoReleaser skip its own commit-scraped changelog generation on its
# own -- no `changelog:` config is needed to achieve that.
#
# Do NOT add `changelog: disable: true` here. It reads like the obvious way
# to spell "no auto-generated changelog," but GoReleaser's own docs say it
# does more than that: "this will also ignore any changelog files passed via
# --release-notes, and will render an empty changelog ... may result in an
# empty release notes on GitHub/GitLab/Gitea"
# (https://goreleaser.com/customization/changelog/). That flag was set here
# from #44 (2026-07-07) through v0.3.0 and silently discarded --release-notes
# the whole time. It coexisted with the v0.1.2 dist/-wipe bug (see the
# "Extract release notes" step in release.yml) -- both independently produce
# an identical empty-body symptom, so v0.1.2 can't be pinned on one or the
# other in hindsight. #59 fixed the dist/-wipe mechanism; this flag was the
# second, undiagnosed one, confirmed still live and sufficient on its own
# when it produced the same empty body again on v0.3.0.
